spring.application.name=config-server
server.port=8888

# Git repo (IMPORTANT FIX)
spring.cloud.config.server.git.uri=https://github.com/jayeshsharma2605/microservices-project
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true

# 👇 IMPORTANT (your config-repo folder)
spring.cloud.config.server.git.search-paths=config-repo,config-repo/global,config-repo/product-service,config-repo/order-service

# Optional but recommended
spring.cloud.config.server.git.force-pull=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always